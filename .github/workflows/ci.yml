name: ci
on: [push]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: npm run bundle
      - run: npm run parity
