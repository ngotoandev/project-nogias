<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Nogias — sim visualizer (dev)</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 13px/1.4 ui-monospace, Menlo, Consolas, monospace; background: #14171c; color: #d7dce3; }
    header { padding: 8px 12px; background: #1b1f26; border-bottom: 1px solid #2a2f38; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    header h1 { font-size: 14px; margin: 0 8px 0 0; color: #9fb4d0; font-weight: 600; }
    header .note { color: #6b7280; font-size: 11px; }
    button, select { font: inherit; background: #2a3038; color: #d7dce3; border: 1px solid #3a424d; border-radius: 5px; padding: 4px 9px; cursor: pointer; }
    button:hover { background: #333b45; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.on { background: #2d5a3d; border-color: #3d7a52; }
    #wrap { display: flex; gap: 10px; padding: 10px; align-items: flex-start; }
    canvas { background: #0e1116; border: 1px solid #2a2f38; border-radius: 6px; }
    #side { width: 290px; flex: none; }
    .panel { background: #1b1f26; border: 1px solid #2a2f38; border-radius: 6px; padding: 9px 11px; margin-bottom: 10px; }
    .panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #7d8aa0; margin: 0 0 6px; }
    #status { font-size: 17px; font-weight: 700; }
    .s-active { color: #7fb4ff; } .s-won { color: #5fd08a; } .s-lost { color: #f0736a; } .s-extracted { color: #e7c061; }
    #log { height: 200px; overflow-y: auto; font-size: 11px; line-height: 1.5; }
    #log .ev { color: #aab4c4; } #log .ev b { color: #d7dce3; }
    #roster div { padding: 1px 0; }
    .hint { color: #7d8aa0; font-size: 11px; }
    kbd { background: #2a3038; border: 1px solid #3a424d; border-radius: 3px; padding: 0 4px; }
  </style>
</head>
<body>
  <header>
    <h1>Nogias sim visualizer</h1>
    <label>map <select id="setup"><option value="campaign">campaign</option><option value="skirmish">skirmish</option></select></label>
    <label>seed <input id="seed" type="number" value="1" style="width:56px; background:#2a3038; color:#d7dce3; border:1px solid #3a424d; border-radius:5px; padding:3px;" /></label>
    <button id="new">New run</button>
    <button id="step">Step ▷</button>
    <button id="auto">Auto ▶</button>
    <label>speed <select id="speed"><option value="450">slow</option><option value="220" selected>med</option><option value="80">fast</option></select></label>
    <button id="extract">Extract ⏏</button>
    <span class="note">dev harness · drives the real <code>Sim.initRun/runTick</code> from <code>dist/sim-bundle.js</code></span>
  </header>
  <div id="wrap">
    <canvas id="cv" width="640" height="560"></canvas>
    <div id="side">
      <div class="panel"><h2>Run</h2><div id="status">—</div><div id="meta" class="hint"></div></div>
      <div class="panel"><h2>Order</h2><div id="sel" class="hint">Click one of your armies, then click a target tile to dispatch.</div></div>
      <div class="panel"><h2>Armies</h2><div id="roster"></div></div>
      <div class="panel"><h2>Events</h2><div id="log"></div></div>
    </div>
  </div>
  <script src="../../dist/sim-bundle.js"></script>
  <script src="setups.js"></script>
  <script src="viz.js"></script>
</body>
</html>
